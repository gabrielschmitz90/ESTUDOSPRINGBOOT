<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Início - Barbearia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="card">
        <h1>Bem-vindo, <span th:text="${nomeUsuario}"></span>!</h1>
        <p th:if="${isAdmin}">Você está logado como <strong>administrador</strong>. Use o menu para gerenciar barbeiros, serviços e agendamentos.</p>
        <p th:unless="${isAdmin}">Marque um horário com o barbeiro de sua preferência.</p>

        <a th:href="@{/agendamentos/novo}" class="btn">Novo Agendamento</a>
        <a th:href="@{/agendamentos}" class="btn btn-secondary">Meus Agendamentos</a>
    </div>
</div>
</body>
</html>
