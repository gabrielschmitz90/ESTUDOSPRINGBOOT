<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Serviço - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="card">
        <h1 th:text="${servico.id} ? 'Editar Serviço' : 'Novo Serviço'"></h1>

        <form th:action="@{/admin/servicos}" th:object="${servico}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" required>
                <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea th:field="*{descricao}" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Preço (R$)</label>
                <input type="number" step="0.01" th:field="*{preco}" required>
                <span class="error" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}"></span>
            </div>

            <div class="form-group">
                <label>Duração (minutos)</label>
                <input type="number" th:field="*{duracaoMinutos}" required>
                <span class="error" th:if="${#fields.hasErrors('duracaoMinutos')}" th:errors="*{duracaoMinutos}"></span>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" th:field="*{ativo}" style="width:auto;"> Ativo
                </label>
            </div>

            <button type="submit" class="btn">Salvar</button>
            <a th:href="@{/admin/servicos}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
</body>
</html>
